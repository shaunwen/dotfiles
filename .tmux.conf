set-option -g default-terminal "screen-256color"
set-option -sa terminal-overrides ',xterm-256color:RGB'

# Action key
unbind C-b
set -g prefix C-a
bind-key C-a send-prefix
set-option -g repeat-time 500
set-option -g focus-events on

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Reload settings
bind r source-file ~/.tmux.conf \; display "Reloaded!"
bind -r e kill-pane -a
bind s split-window -v
bind v split-window -h

# Vim-like pane switching
bind -r k select-pane -U 
bind -r j select-pane -D 
bind -r h select-pane -L 
bind -r l select-pane -R

# Open project in a new tmux session
bind-key -r f run-shell "tmux neww ~/.local/bin/tmux-sessionizer"

# Moving window
bind-key -n C-S-Left swap-window -t -1 \; previous-window
bind-key -n C-S-Right swap-window -t +1 \; next-window

# Resizing pane
bind -r Up resize-pane -U 5
bind -r Down resize-pane -D 5
bind -r Left resize-pane -L 5
bind -r Right resize-pane -R 5

### Basic settings
set-option -g status-justify "left"
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection
# Prevent automatic copy after mouse selection
unbind -T copy-mode-vi MouseDragEnd1Pane
set -g mouse on

# Look'n feel
set-option -g status-fg cyan
set-option -g status-bg black
set -g window-style fg=white,bg=default
set -g window-active-style fg=colour12,bg=default
set-option -g history-limit 64096

set -sg escape-time 10

# Colour

# default statusbar colors
set-option -g status-style bg=colour235,fg=colour136,default

# default window title colors
set-window-option -g window-status-style fg=colour244,bg=colour234,dim

# active window title colors
set-window-option -g window-status-current-style fg=colour166,bg=default,bright

# pane border
set-option -g pane-border-style fg=white,bg=default #base02
set-option -g pane-active-border-style fg=colour36,bg=default #colour235

# message text
set-option -g message-style bg=colour235,fg=colour166

# pane number display
set-option -g display-panes-active-colour colour33 #blue
set-option -g display-panes-colour colour166 #orange

# clock
set-window-option -g clock-mode-colour colour64 #green

# allow the title bar to adapt to whatever host you connect to
set -g set-titles on
set -g set-titles-string "#T"

set -g automatic-rename off
#set -g history-file ~/.tmux_history

set -g set-clipboard on
set -g pane-scrollbars on
# Use Tab to cycle selection modes
bind -T copy-mode-vi Tab send-keys -X selection-mode

# tpm plugin
set -g @plugin 'tmux-plugins/tpm'
# list of tmux plugins
set -g @plugin 'tmux-plugins/tmux-resurrect' # persist tmux sessions after computer restart
set -g @plugin 'tmux-plugins/tmux-continuum' # automatically saves sessions for you every 15 minutes
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

set -g @plugin 'sainnhe/tmux-fzf'
TMUX_FZF_LAUNCH_KEY="C-f"
# Initialize TUX plugin manager (keep this line at the very bottom of tmux. conf)
run '~/.tmux/plugins/tpm/tpm
